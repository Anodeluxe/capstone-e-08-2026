services:

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: toren_db
    environment:
      POSTGRES_DB: toren_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - toren_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: toren_redis
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: toren_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

volumes:
  toren_db_data:
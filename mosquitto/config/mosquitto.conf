# Mosquitto MQTT Broker — development config

# Plain MQTT on port 1883 (ESP32 and backend connect here)
listener 1883
protocol mqtt

# WebSocket listener on port 9001 (optional: browser-based MQTT clients)
listener 9001
protocol websockets

# Allow connections without username/password (development only)
allow_anonymous true

# Persist messages across broker restarts
persistence true
persistence_location /mosquitto/data/

# Log to stdout so Docker logs show broker activity
log_dest stdout
log_type all
